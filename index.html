<script>
    // --- State Initialization ---
    let categories = JSON.parse(localStorage.getItem('dyn_categories')) || {};
    let masterTasks = JSON.parse(localStorage.getItem('dyn_master_tasks')) || {};
    let executionLogs = JSON.parse(localStorage.getItem('dyn_execution_logs')) || {};
    let lastLogin = localStorage.getItem('last_login') || "";

    // --- Core Accountability Engine ---
    function checkDailyAccountability() {
        const today = new Date().toISOString().split('T')[0];
        if (lastLogin !== today) {
            // Fill gaps if user missed days
            if (lastLogin !== "") fillMissedDays(lastLogin, today);
            
            showAccountabilityModal();
        }
        localStorage.setItem('last_login', today);
    }

    function fillMissedDays(start, end) {
        let d = new Date(start);
        d.setDate(d.getDate() + 1);
        while (d.toISOString().split('T')[0] < end) {
            markAllAsFailed(d.toISOString().split('T')[0]);
            d.setDate(d.getDate() + 1);
        }
    }

    function showAccountabilityModal() {
        const overlay = document.createElement('div');
        overlay.id = "daily-modal";
        overlay.style = "position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:1000; display:flex; align-items:center; justify-content:center;";
        
        let html = `<div style="background:#1e1e1e; padding:30px; border-radius:10px; width:400px; border:1px solid var(--accent);">
            <h2>Daily Accountability</h2>
            <p>Did you complete your goals today?</p><div id="modal-tasks">`;
        
        Object.keys(categories).forEach(catId => {
            masterTasks[catId].forEach(task => {
                html += `<div style="margin:10px 0;">
                    <input type="checkbox" id="check_${task.id}" checked> ${task.name}
                </div>`;
            });
        });
        
        html += `</div><button class="btn" style="width:100%; margin-top:20px;" onclick="submitDailyLog()">Log & Continue</button></div>`;
        overlay.innerHTML = html;
        document.body.appendChild(overlay);
    }

    window.submitDailyLog = function() {
        const today = new Date().toISOString().split('T')[0];
        Object.keys(categories).forEach(catId => {
            masterTasks[catId].forEach(task => {
                const checked = document.getElementById(`check_${task.id}`).checked;
                logTask(today, catId, task.id, checked);
            });
        });
        document.getElementById('daily-modal').remove();
        renderActiveChecklist();
        updateAnalyticsChart();
    };

    function logTask(date, catId, taskId, status) {
        if (!executionLogs[date]) executionLogs[date] = {};
        if (!executionLogs[date][catId]) executionLogs[date][catId] = {};
        executionLogs[date][catId][taskId] = { completed: status, metricValue: "" };
        saveStateToLocalStorage();
    }

    function markAllAsFailed(date) {
        Object.keys(categories).forEach(catId => {
            masterTasks[catId].forEach(task => logTask(date, catId, task.id, false));
        });
    }

    // --- UI Logic (Integrate into your existing script) ---
    // Update renderActiveChecklist to pull from current date rather than cycle
    function renderActiveChecklist() {
        const container = document.getElementById('checklist');
        const today = new Date().toISOString().split('T')[0];
        container.innerHTML = '';
        if(!currentTab) return;

        const activeTasks = masterTasks[currentTab] || [];
        activeTasks.forEach((task, index) => {
            const entry = executionLogs[today]?.[currentTab]?.[task.id] || { completed: true };
            const itemNode = document.createElement('div');
            itemNode.className = 'task-item';
            itemNode.innerHTML = `
                <div class="task-main">
                    <div class="task-content" onclick="toggleTaskCompletion('${today}', '${task.id}')">
                        <input type="checkbox" ${entry.completed ? 'checked' : ''}>
                        <span class="${!entry.completed ? 'skipped-text' : ''}">${task.name}</span>
                    </div>
                </div>`;
            container.appendChild(itemNode);
        });
    }

    // --- Analytics Update ---
    function updateAnalyticsChart() {
        const ctx = document.getElementById('historyChart').getContext('2d');
        if (chartInstance) chartInstance.destroy();
        
        const dates = Object.keys(executionLogs).slice(-7);
        const data = dates.map(date => {
            let total = 0, completed = 0;
            Object.keys(executionLogs[date]).forEach(cat => {
                Object.values(executionLogs[date][cat]).forEach(t => {
                    total++;
                    if(t.completed) completed++;
                });
            });
            return total === 0 ? 0 : (completed / total) * 100;
        });

        chartInstance = new Chart(ctx, {
            type: 'line',
            data: { labels: dates, datasets: [{ label: 'Daily Completion %', data: data, borderColor: '#4ade80' }] },
            options: { scales: { y: { min: 0, max: 100 } } }
        });
    }

    // Initialization
    checkDailyAccountability();
    renderNavigationControls();
    if(Object.keys(categories).length > 0) switchWorkspaceTab(Object.keys(categories)[0]);
</script>
