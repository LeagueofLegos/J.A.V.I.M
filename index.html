<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quest Log Pro - Split Archetype Engine</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg: #121212;
            --card-bg: #1e1e1e;
            --text: #e0e0e0;
            --accent: #4ade80;
            --professional: #3b82f6; /* Focus Blue */
            --leisure: #10b981;      /* Mastery Green */
            --sysadmin: #a855f7;     /* Health Purple */
            --danger: #ff5f5f;
            --nav-bg: #2a2a2a;
            --interactive: #2d2d2d;
        }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* Navigation */
        nav {
            width: 100%;
            background: var(--nav-bg);
            padding: 10px 0;
            display: flex;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        nav button {
            background: none;
            border: 1px solid #444;
            color: var(--text);
            padding: 8px 12px;
            cursor: pointer;
            border-radius: 5px;
            font-size: 0.9rem;
            text-transform: capitalize;
        }
        nav button.active {
            background: var(--accent);
            color: black;
            border-color: var(--accent);
        }
        
        /* Archetype System Banners */
        .system-banner {
            width: 100%;
            padding: 12px;
            text-align: center;
            font-weight: bold;
            font-size: 1rem;
            margin-bottom: 15px;
            box-sizing: border-box;
            border-bottom: 2px solid rgba(255,255,255,0.1);
        }
        .banner-professional { background: rgba(59, 130, 246, 0.2); color: #60a5fa; border-color: var(--professional); }
        .banner-leisure { background: rgba(16, 185, 129, 0.2); color: #34d399; border-color: var(--leisure); }

        .container { width: 90%; max-width: 550px; padding: 20px; }
        h1 { border-bottom: 2px solid var(--accent); padding-bottom: 10px; text-transform: capitalize; margin-top: 10px;}
        
        /* Modals & Collapse Tools */
        .config-panel {
            background: var(--card-bg);
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            border: 1px solid #333;
        }
        .config-panel h3 { margin-top: 0; color: var(--accent); }

        /* Input Controls */
        .input-group { display: flex; gap: 10px; margin-bottom: 15px; flex-wrap: wrap; }
        input[type="text"], input[type="number"], select {
            flex: 1; padding: 10px; border-radius: 5px; border: 1px solid #444;
            background: var(--bg); color: white; min-width: 80px;
        }
        .btn {
            padding: 10px 15px; background: var(--accent); border: none;
            border-radius: 5px; font-weight: bold; cursor: pointer; color: black;
        }
        .btn-danger { background: var(--danger); color: white; }
        .btn-secondary { background: #555; color: white; }

        /* Task Display */
        .task-item {
            display: flex; align-items: center; background: var(--card-bg);
            margin: 8px 0; padding: 12px; border-radius: 8px; justify-content: space-between;
        }
        .task-content { display: flex; align-items: center; flex: 1; cursor: pointer; }
        input[type="checkbox"] { margin-right: 15px; transform: scale(1.3); accent-color: var(--accent); }
        .completed { text-decoration: line-through; opacity: 0.4; }
        .date-badge { font-size: 0.75rem; color: #888; margin-left: auto; padding-right: 15px; }
        
        .delete-btn { color: var(--danger); background: none; border: none; font-size: 1.2rem; cursor: pointer; }
        
        /* Layout Modules */
        #stats-container, .sync-container { margin-top: 30px; background: var(--card-bg); padding: 15px; border-radius: 10px; border: 1px solid #333; }
        textarea { width: 100%; height: 60px; background: #121212; color: #4ade80; border: 1px solid #444; padding: 8px; border-radius: 5px; font-family: monospace; box-sizing: border-box; resize: none;}
        .meta-text { font-size: 0.8rem; color: #888; margin-bottom: 10px; display: block;}
    </style>
</head>
<body>

<!-- Dynamic Calendar Target Lock Banner -->
<div id="system-day-banner" class="system-banner">Initializing System Routines...</div>

<nav id="main-nav"></nav>

<div class="container">
    <!-- Category Manager (Hidden to save mental clutter, but completely functional) -->
    <div class="config-panel" style="display: none;" id="dev-config-panel">
        <h3>+ Create Custom Channel</h3>
        <div class="input-group">
            <input type="text" id="new-cat-id" placeholder="e.g., side-project">
            <select id="new-cat-type">
                <option value="days">Resets Every X Days</option>
                <option value="never">Never Resets (Infinite)</option>
            </select>
            <input type="number" id="new-cat-val" value="1" min="1" style="max-width: 60px;">
            <button class="btn" onclick="createNewCategory()">Create</button>
        </div>
    </div>

    <!-- Active Area -->
    <div style="display:flex; justify-content:space-between; align-items:center;">
        <h1 id="view-title">Loading Tasks...</h1>
        <button class="btn btn-secondary" onclick="toggleConfig()" style="padding:5px 10px; font-size:0.8rem;">Toggle Config Panel</button>
        <button class="btn btn-danger" id="del-cat-btn" style="display:none; padding:5px 10px; font-size:0.8rem;">Delete Layer</button>
    </div>
    
    <span class="meta-text" id="reset-rules-text"></span>

    <div class="input-group">
        <input type="text" id="task-input" placeholder="Add custom action to this profile...">
        <button class="btn" onclick="addTask()">Add</button>
    </div>

    <div id="checklist"></div>

    <!-- Data Insights -->
    <div id="stats-container">
        <h3>Consistency Metrics (Total Days Fulfilled)</h3>
        <canvas id="historyChart"></canvas>
    </div>

    <!-- Cross-Device Sync Engine -->
    <div class="sync-container">
        <h3>Device-to-Device Synchronization</h3>
        <span class="meta-text">Copy your encrypted state to deploy across platforms seamlessly:</span>
        <div class="input-group">
            <button class="btn btn-secondary" onclick="exportState()">Generate Export String</button>
            <button class="btn" onclick="importState()">Load Imported String</button>
        </div>
        <textarea id="sync-box" placeholder="Paste data bundle here..."></textarea>
    </div>
</div>

<script>
    let currentTab = '';
    let chart = null;

    // Split-Archetype Engine Default Mapping Layout
    const defaultCategories = {
        sysadmin: { type: 'days', interval: 1, label: '🛠️ SysAdmin (Daily Health)' },
        professional: { type: 'days', interval: 1, label: '👔 The Professional' },
        mastery: { type: 'days', interval: 1, label: '🎮 Language & FGC Matchups' }
    };

    // Organized Tasks, separated cleanly by internal identity goals
    const defaultTasks = {
        sysadmin: [
            "Morning routine & hydration",
            "Wrist Exercises & Stretches (First Pass)",
            "Wrist Exercises & Stretches (Post-Session Recovery)",
            "Shower & basic maintenance/hygiene Check",
            "Night routine & sleep buffer"
        ],
        professional: [
            "Grind LeetCode: Solve ONE targeted problem and analyze logic",
            "Job Hunt: Customize resume and submit ONE targeted application",
            "Project/GitHub Contribution (Even a small layout adjust)"
        ],
        mastery: [
            "The Linguist: Complete daily language flashcard reviews (Anki)",
            "The Competitor: Active lab work, setup execution, or safe match-ups",
            "Passive Immersion: Run streams, tournament footage, or media in target language"
        ]
    };

    // State Hydration
    let categories = getData('app_categories', defaultCategories);
    let masterTasks = getData('app_master_tasks', defaultTasks);
    let taskHistory = getData('app_task_history', {}); 

    function getData(key, fallback) {
        const data = localStorage.getItem(key);
        return data ? JSON.parse(data) : fallback;
    }

    function saveState() {
        localStorage.setItem('app_categories', JSON.stringify(categories));
        localStorage.setItem('app_master_tasks', JSON.stringify(masterTasks));
        localStorage.setItem('app_task_history', JSON.stringify(taskHistory));
    }

    function toggleConfig() {
        const panel = document.getElementById('dev-config-panel');
        panel.style.display = panel.style.display === 'none' ? 'block' : 'none';
    }

    // Evaluates day structure dynamically to update target locks
    function evaluateSystemDay() {
        const dayOfWeek = new Date().getDay(); // 0 = Sunday, 1 = Monday, etc.
        const dayNames = ["Sunday", "Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday"];
        const currentDayName = dayNames[dayOfWeek];
        
        const banner = document.getElementById('system-day-banner');
        
        // Schedule Rules Engine:
        // Mon, Wed, Fri (1, 3, 5) = Professional Focus Profile
        if ([1, 3, 5].includes(dayOfWeek)) {
            banner.className = "system-banner banner-professional";
            banner.innerText = `[TARGET LOCK: ${currentDayName.toUpperCase()}] Today is a PROFESSIONAL day. Focus on career. Mastery tasks are safely off-loaded.`;
            return 'professional';
        } 
        // Tue, Thu, Sat, Sun (2, 4, 6, 0) = Language & Fighting Games Profile
        else {
            banner.className = "system-banner banner-leisure";
            banner.innerText = `[TARGET LOCK: ${currentDayName.toUpperCase()}] Today is a MASTERY day. Run language loops and active netplay matchups.`;
            return 'mastery';
        }
    }

    // Dynamic Navigation Renderer
    function renderNav() {
        const nav = document.getElementById('main-nav');
        nav.innerHTML = '';
        Object.keys(categories).forEach(cat => {
            const btn = document.createElement('button');
            btn.id = `btn-${cat}`;
            btn.innerText = categories[cat].label || cat;
            btn.onclick = () => switchTab(cat);
            if (cat === currentTab) btn.className = 'active';
            
            // Apply unique highlight colors to matching functional profiles
            if (cat === 'professional') btn.style.borderBottom = "3px solid var(--professional)";
            if (cat === 'mastery') btn.style.borderBottom = "3px solid var(--leisure)";
            if (cat === 'sysadmin') btn.style.borderBottom = "3px solid var(--sysadmin)";
            
            nav.appendChild(btn);
        });
    }

    function switchTab(tab) {
        if (!categories[tab]) tab = Object.keys(categories)[0] || 'sysadmin';
        currentTab = tab;
        
        document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
        const activeBtn = document.getElementById(`btn-${tab}`);
        if(activeBtn) activeBtn.classList.add('active');
        
        // Dynamically adjust operational accent color based on active tab profile
        if (tab === 'professional') document.documentElement.style.setProperty('--accent', 'var(--professional)');
        else if (tab === 'mastery') document.documentElement.style.setProperty('--accent', 'var(--leisure)');
        else if (tab === 'sysadmin') document.documentElement.style.setProperty('--accent', 'var(--sysadmin)');
        else document.documentElement.style.setProperty('--accent', '#4ade80');

        document.getElementById('view-title').innerText = `${categories[tab].label || tab}`;
        
        const rulesText = categories[tab].type === 'never' ? 'Tracking Structure: Persistent (Never Resets)' : `Tracking Structure: Cyclical Interval (${categories[tab].interval} Days)`;
        document.getElementById('reset-rules-text').innerText = rulesText;
        
        render();
    }

    function createNewCategory() {
        const idInput = document.getElementById('new-cat-id');
        const rawId = idInput.value.trim().toLowerCase().replace(/[^a-z0-9]/g, '');
        const type = document.getElementById('new-cat-type').value;
        const interval = parseInt(document.getElementById('new-cat-val').value) || 1;

        if(!rawId || categories[rawId]) return alert('Invalid or existing category handle.');

        categories[rawId] = {
            type: type,
            interval: type === 'never' ? Infinity : interval,
            label: idInput.value.trim()
        };
        masterTasks[rawId] = [];
        
        idInput.value = '';
        saveState();
        renderNav();
        switchTab(rawId);
    }

    // Interval Calculation Logic
    function getResetCycleId() {
        const catConfig = categories[currentTab];
        if (!catConfig || catConfig.type === 'never') return 'static_epoch';

        const now = new Date();
        // Global anchor shift to 3:00 AM local time window
        const adjustedTime = new Date(now.getTime() - (3 * 60 * 60 * 1000));
        const totalDays = Math.floor(adjustedTime.getTime() / (1000 * 60 * 60 * 24));
        
        const cycleChunk = Math.floor(totalDays / catConfig.interval);
        return `cycle_${cycleChunk}`;
    }

    function addTask() {
        const input = document.getElementById('task-input');
        const val = input.value.trim();
        if (!val) return;

        if (!masterTasks[currentTab]) masterTasks[currentTab] = [];
        masterTasks[currentTab].push(val);
        
        input.value = '';
        saveState();
        render();
    }

    window.toggleTask = function(taskName) {
        const cycleId = getResetCycleId();
        const todayStr = new Date().toDateString();

        if (!taskHistory[currentTab]) taskHistory[currentTab] = {};
        if (!taskHistory[currentTab][taskName]) taskHistory[currentTab][taskName] = { cycles: {}, timestamps: [] };

        const taskNode = taskHistory[currentTab][taskName];
        taskNode.cycles[cycleId] = !taskNode.cycles[cycleId];

        if (taskNode.cycles[cycleId]) {
            if (!taskNode.timestamps.includes(todayStr)) {
                taskNode.timestamps.push(todayStr);
            }
        } else {
            taskNode.timestamps = taskNode.timestamps.filter(t => t !== todayStr);
        }

        saveState();
        render();
    };

    window.deleteTask = function(index) {
        const taskName = masterTasks[currentTab][index];
        if(confirm(`Remove "${taskName}" safely from database log structures?`)){
            if(taskHistory[currentTab] && taskHistory[currentTab][taskName]) {
                delete taskHistory[currentTab][taskName];
            }
            masterTasks[currentTab].splice(index, 1);
            saveState();
            render();
        }
    };

    function updateChart() {
        const tasks = masterTasks[currentTab] || [];
        const oneYearAgo = Date.now() - (365 * 24 * 60 * 60 * 1000);

        const datasetValues = tasks.map(task => {
            const node = taskHistory[currentTab]?.[task];
            if (!node || !node.timestamps) return 0;
            return node.timestamps.filter(ts => new Date(ts).getTime() >= oneYearAgo).length;
        });

        const ctx = document.getElementById('historyChart').getContext('2d');
        if (chart) chart.destroy();

        // Dynamically match graph color scheme to current context
        const colorVar = getComputedStyle(document.documentElement).getPropertyValue('--accent').trim();

        chart = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: tasks,
                datasets: [{
                    data: datasetValues,
                    backgroundColor: colorVar,
                    borderRadius: 4,
                    borderSkipped: false,
                    barThickness: 14
                }]
            },
            options: {
                indexAxis: 'y',
                responsive: true,
                scales: {
                    x: { 
                        beginAtZero: true, 
                        grid: { color: '#2a2a2a' }, 
                        ticks: { color: '#888', stepSize: 1 },
                        title: { display: true, text: 'Total Completions (Past Year)', color: '#666' }
                    },
                    y: { 
                        grid: { display: false }, 
                        ticks: { color: '#e0e0e0', font: { size: 11 } } 
                    }
                },
                plugins: { legend: { display: false } }
            }
        });
    }

    function render() {
        const container = document.getElementById('checklist');
        const tasks = masterTasks[currentTab] || [];
        const cycleId = getResetCycleId();

        container.innerHTML = '';
        tasks.forEach((task, index) => {
            const taskData = taskHistory[currentTab]?.[task];
            const isChecked = taskData?.cycles[cycleId] || false;
            
            const lastDate = (taskData?.timestamps && taskData.timestamps.length > 0) 
                ? taskData.timestamps[taskData.timestamps.length - 1].split(' ').slice(1,3).join(' ')
                : '';

            const div = document.createElement('div');
            div.className = 'task-item';
            div.innerHTML = `
                <div class="task-content" onclick="toggleTask('${task}')">
                    <input type="checkbox" ${isChecked ? 'checked' : ''}>
                    <span class="${isChecked ? 'completed' : ''}">${task}</span>
                </div>
                ${lastDate ? `<span class="date-badge">Done: ${lastDate}</span>` : ''}
                <button class="delete-btn" onclick="deleteTask(${index})">×</button>
            `;
            container.appendChild(div);
        });
        updateChart();
    }

    function exportState() {
        const bundle = { categories, masterTasks, taskHistory };
        document.getElementById('sync-box').value = btoa(encodeURIComponent(JSON.stringify(bundle)));
        alert("Encrypted sync payload copied to interface text block.");
    }

    function importState() {
        const raw = document.getElementById('sync-box').value.trim();
        if (!raw) return alert("Target input payload container is empty.");
        try {
            const parsed = JSON.parse(decodeURIComponent(atob(raw)));
            if (parsed.categories && parsed.masterTasks && parsed.taskHistory) {
                categories = parsed.categories;
                masterTasks = parsed.masterTasks;
                taskHistory = parsed.taskHistory;
                saveState();
                renderNav();
                const initialTab = evaluateSystemDay();
                switchTab(initialTab);
                alert("State database successfully merged and reloaded.");
            } else {
                throw new Error("Corrupt payload framework structural integrity.");
            }
        } catch(e) {
            alert("Parsing Exception: Verify data block validity.");
        }
    }

    // Run Engine Initializing Protocols
    const initialTargetTab = evaluateSystemDay();
    renderNav();
    switchTab(initialTargetTab);
</script>
</body>
</html>
