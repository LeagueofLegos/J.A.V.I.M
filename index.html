<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>J.A.V.I.M. // Digital Butler</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;800&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
    <!-- Include PDF.js and Mammoth.js libraries for 100% local browser text extraction -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
    <style>
        :root {
            --bg: #050508;
            --panel: #0d0d14;
            --border: rgba(0, 255, 136, 0.12);
            --accent: #00ff88;
            --accent-dim: rgba(0, 255, 136, 0.05);
            --text: #e2e2e9;
            --text-dim: #78788c;
            --user-msg: #3b82f6;
        }

        body {
            font-family: 'Space Grotesk', sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            height: -webkit-fill-available;
            overflow: hidden;
        }

        html { height: -webkit-fill-available; }

        .workspace {
            flex: 1;
            padding: 15px;
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
            max-width: 800px;
            margin: 0 auto;
            width: 100%;
            height: 100%;
            min-height: 0;
        }

        .view-header {
            border-bottom: 1px solid var(--border);
            padding-bottom: 12px;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .view-header h1 { 
            font-family: 'Orbitron', sans-serif; 
            font-size: 18px; 
            margin: 0; 
            letter-spacing: 2px; 
            color: var(--accent); 
        }

        .main-layout {
            display: flex;
            flex-direction: column;
            flex: 1;
            min-height: 0;
            gap: 15px;
        }

        /* File Dropper Panel Styles */
        .drop-zone {
            background: var(--panel);
            border: 2px dashed var(--border);
            border-radius: 8px;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .drop-zone.drag-over {
            background: var(--accent-dim);
            border-color: var(--accent);
        }
        .drop-zone p { margin: 0; font-size: 14px; color: var(--text); }
        .drop-zone span { font-size: 11px; color: var(--text-dim); display: block; margin-top: 5px; }

        .terminal-container {
            background: #020204;
            border: 1px solid var(--border);
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            flex: 1;
            box-shadow: 0 0 20px rgba(0, 255, 136, 0.02);
        }

        .terminal-feed {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            font-size: 14px;
            line-height: 1.5;
        }

        .msg { display: flex; flex-direction: column; max-width: 85%; }
        .msg.sys { align-self: flex-start; }
        .msg.user { align-self: flex-end; }
        
        .msg-sender { font-size: 9px; font-family: 'Orbitron', sans-serif; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px; }
        .msg.sys .msg-sender { color: var(--accent); }
        .msg.user .msg-sender { color: var(--user-msg); text-align: right; }

        .msg-text { background: #09090f; padding: 10px 14px; border-radius: 6px; border: 1px solid rgba(255,255,255,0.02); white-space: pre-wrap; }
        .msg.sys .msg-text { border-color: rgba(0, 255, 136, 0.15); }
        .msg.user .msg-text { border-color: rgba(59, 130, 246, 0.15); }

        .msg-text a { color: var(--accent); text-decoration: underline; font-weight: 500; }
        .msg-text a:focus { outline: 2px dashed var(--accent); outline-offset: 2px; }
        .msg-text h3 { margin: 5px 0 10px 0; color: var(--accent); font-family: 'Orbitron', sans-serif; font-size: 14px; }
        .msg-text code { background: rgba(255,255,255,0.08); padding: 2px 6px; border-radius: 3px; font-family: monospace; font-size: 12px; }

        .terminal-input-bar {
            display: flex;
            border-top: 1px solid var(--border);
            background: #07070b;
            padding: 10px;
            gap: 10px;
            align-items: center;
        }
        
        .terminal-input-bar input { 
            flex: 1;
            background: #020204;
            border: 1px solid rgba(255,255,255,0.08);
            color: white;
            padding: 10px;
            border-radius: 4px;
            font-family: inherit;
            font-size: 14px;
        }
        .terminal-input-bar input:focus { outline: none; border-color: var(--accent); }

        .btn {
            padding: 10px 15px;
            background: none;
            border: 1px solid var(--border);
            color: var(--accent);
            border-radius: 4px;
            font-family: 'Orbitron', sans-serif;
            font-size: 11px;
            font-weight: 700;
            cursor: pointer;
            text-transform: uppercase;
            transition: all 0.2s;
            box-sizing: border-box;
        }
        .btn:hover { background: var(--accent); color: black; }

        @media (max-width: 768px) {
            .workspace { padding: 10px; }
            .view-header h1 { font-size: 16px; }
        }
    </style>
</head>
<body>

<div class="workspace">
    <div class="view-header">
        <div>
            <h1>J.A.V.I.M. // INGESTION</h1>
            <div style="font-size: 9px; color: var(--text-dim); font-family: 'Orbitron'; margin-top: 4px;">Just A Very Intelligent Model</div>
        </div>
        <div id="clock-display" style="font-family: monospace; font-size: 13px; color: var(--accent);">00:00:00</div>
    </div>

    <div class="main-layout">
        <!-- Local Processing Drop Zone -->
        <div class="drop-zone" id="drop-zone" onclick="document.getElementById('file-input').click()">
            <p>Drag & Drop Documents Here or Click to Browse</p>
            <span>Supports PDF, DOCX, TXT, MD (Converted locally into LLM-ready JSON text)</span>
            <input type="file" id="file-input" style="display: none;" accept=".pdf,.docx,.txt,.md">
        </div>

        <div class="terminal-container">
            <div id="terminal-feed" class="terminal-feed"></div>
            <div class="terminal-input-bar">
                <span style="color: var(--accent); font-weight: bold;">&gt;</span>
                <input type="text" id="terminal-input" placeholder="Execute commands or inspect context status..." autocomplete="off">
                <button class="btn" onclick="handleUserSubmit()">Send</button>
            </div>
        </div>
    </div>
</div>

<script>
// Configure local worker path for PDF processing engine
pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';

// Volatile in-memory runtime history (no localStorage calls, resets clean on page reload)
let sessionDialogHistory = [
    { sender: 'sys', text: "### J.A.V.I.M. Operational Parameters\n\nStanding by to process data. Drop any document above to parse it instantly into text-optimized JSON structures for your local machine terminal." }
];

function updateClock() {
    const now = new Date();
    document.getElementById('clock-display').innerText = now.toTimeString().split(' ')[0];
}
setInterval(updateClock, 1000);

function formatMessageText(inputText) {
    let securedText = inputText.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
    securedText = securedText.replace(/^### (.*)$/gm, '<h3>$1</h3>');
    securedText = securedText.replace(/`([^`]+)`/g, '<code>$1</code>');
    
    const urlPattern = /(https?:\/\/[^\s\(\)\<\>]+)/g;
    securedText = securedText.replace(urlPattern, function(url) {
        let cleanUrl = url.endsWith('.') || url.endsWith(',') ? url.slice(0, -1) : url;
        return `<a href="${cleanUrl}" target="_blank" rel="noopener noreferrer" tabindex="0">${cleanUrl}</a>`;
    });
    return securedText;
}

function renderTerminalFeed() {
    const feed = document.getElementById('terminal-feed');
    feed.innerHTML = '';
    sessionDialogHistory.forEach(msg => {
        const card = document.createElement('div');
        card.className = `msg ${msg.sender}`;
        card.innerHTML = `
            <span class="msg-sender">${msg.sender === 'sys' ? 'J.A.V.I.M.' : 'USER'}</span>
            <div class="msg-text">${formatMessageText(msg.text)}</div>
        `;
        feed.appendChild(card);
    });
    feed.scrollTop = feed.scrollHeight;
}

function appendDialog(sender, text) {
    sessionDialogHistory.push({ sender, text });
    renderTerminalFeed();
}

function detectOS() {
    const platform = navigator.platform.toLowerCase();
    const userAgent = navigator.userAgent.toLowerCase();
    if (platform.includes('win') || userAgent.includes('windows')) return 'windows';
    if (platform.includes('linux') || userAgent.includes('linux')) return 'linux';
    return 'unknown';
}

function getTerminalSetupInstructions() {
    const os = detectOS();
    if (os === 'windows') {
        return `### Local Terminal Guide (Windows)\n\n` +
               `1. Open PowerShell or Command Prompt.\n` +
               `2. To feed the processed JSON text straight into your model instance, execute:\n` +
               `   \`ollama run llama3 "Your copied JSON data goes here"\`\n\n` +
               `*Engine download paths available at: https://ollama.com/download*`;
    } else {
        return `### Local Terminal Guide (Linux)\n\n` +
               `1. Launch your preferred shell window.\n` +
               `2. Pass parsed payloads into your inference parameters directly:\n` +
               `   \`ollama run llama3 "$(cat parsed_document.json)"\`\n\n` +
               `*Linux pipeline installation: \`curl -fsSL https://ollama.com/install.sh | sh\`*`;
    }
}

// File Ingestion Logic
const dropZone = document.getElementById('drop-zone');
const fileInput = document.getElementById('file-input');

['dragenter', 'dragover'].forEach(eventName => {
    dropZone.addEventListener(eventName, (e) => { e.preventDefault(); dropZone.classList.add('drag-over'); }, false);
});
['dragleave', 'drop'].forEach(eventName => {
    dropZone.addEventListener(eventName, (e) => { e.preventDefault(); dropZone.classList.remove('drag-over'); }, false);
});

dropZone.addEventListener('drop', (e) => { handleFiles(e.dataTransfer.files); });
fileInput.addEventListener('change', (e) => { handleFiles(e.target.files); });

function handleFiles(files) {
    if (!files.length) return;
    const file = files[0];
    const reader = new FileReader();
    
    appendDialog('sys', `Analyzing and parsing file: \`${file.name}\`...`);

    if (file.name.endsWith('.txt') || file.name.endsWith('.md')) {
        reader.onload = function(e) { processExtractedText(file.name, e.target.result); };
        reader.readAsText(file);
    } else if (file.name.endsWith('.docx')) {
        reader.onload = function(e) {
            mammoth.extractRawText({ arrayBuffer: e.target.result })
                .then(result => processExtractedText(file.name, result.value))
                .catch(err => appendDialog('sys', `### Ingestion Error\nCould not extract DOCX contents.`));
        };
        reader.readAsArrayBuffer(file);
    } else if (file.name.endsWith('.pdf')) {
        reader.onload = function(e) {
            const typedarray = new Uint8Array(e.target.result);
            pdfjsLib.getDocument(typedarray).promise.then(pdf => {
                let maxPages = pdf.numPages;
                let countPromises = [];
                for (let j = 1; j <= maxPages; j++) {
                    countPromises.push(pdf.getPage(j).then(page => page.getTextContent().then(text => text.items.map(s => s.str).join(' '))));
                }
                Promise.all(countPromises).then(pageTexts => processExtractedText(file.name, pageTexts.join('\n')));
            }).catch(err => appendDialog('sys', `### Ingestion Error\nFailed parsing document pages.`));
        };
        reader.readAsArrayBuffer(file);
    } else {
        appendDialog('sys', "### File Rejected\nFormat unsupported. Please utilize structured plain text, markdown, PDFs, or Word documents.");
    }
}

function processExtractedText(filename, rawText) {
    // Generate structure optimized explicitly for LLM context reading bounds
    const structuredPayload = {
        metadata: {
            source_file: filename,
            ingest_timestamp: new Date().toISOString(),
            character_count: rawText.length
        },
        payload: {
            extracted_content: rawText.trim()
        }
    };
    
    const outputJson = JSON.stringify(structuredPayload, null, 2);
    
    appendDialog('sys', `### JSON Conversion Successful\n\nCopy the text configuration block below and execute it directly inside your system console environment:\n\n\`\`\`json\n${outputJson}\n\`\`\``);
}

function handleUserSubmit() {
    const input = document.getElementById('terminal-input');
    const text = input.value.trim();
    if (!text) return;

    appendDialog('user', text);
    input.value = '';

    // Standard static dashboard terminal instructions fallback
    setTimeout(() => {
        const guidance = getTerminalSetupInstructions();
        appendDialog('sys', `${guidance}\n\n*Note: Ingestion data is currently isolated to memory. Paste your target data directly alongside your model invocation call inside your prompt tool.*`);
    }, 400);
}

window.addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && document.activeElement === document.getElementById('terminal-input')) {
        handleUserSubmit();
    }
});

updateClock();
renderTerminalFeed();
</script>
</body>
</html>
