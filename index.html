<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Quest Log // Interrogation Terminal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Space+Grotesk:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #060608;
            --panel: #0d0d12;
            --border: rgba(255, 255, 255, 0.07);
            --accent: #00ff88;
            --accent-dim: rgba(0, 255, 136, 0.08);
            --danger: #ff4655;
            --danger-dim: rgba(255, 70, 85, 0.1);
            --text: #e2e2e9;
            --text-dim: #6d6d7e;
            --terminal-user: #3b82f6;
        }

        body {
            font-family: 'Space Grotesk', sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        .sidebar {
            width: 320px;
            background: #09090c;
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            padding: 24px;
            box-sizing: border-box;
            justify-content: space-between;
        }

        h2 {
            font-family: 'Orbitron', sans-serif;
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--text-dim);
            margin: 20px 0 10px 0;
        }

        .config-box {
            background: var(--panel);
            border: 1px solid var(--border);
            padding: 14px;
            border-radius: 8px;
            margin-bottom: 15px;
        }

        input, select, textarea {
            width: 100%;
            background: #040405;
            border: 1px solid var(--border);
            color: white;
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 10px;
            font-family: inherit;
            box-sizing: border-box;
            font-size: 13px;
        }
        input:focus, textarea:focus {
            outline: none;
            border-color: var(--accent);
        }

        textarea { height: 120px; resize: none; color: var(--accent); font-family: monospace; }

        .btn {
            width: 100%;
            padding: 12px;
            background: var(--accent);
            color: black;
            border: none;
            border-radius: 6px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            transition: 0.15s;
            font-size: 12px;
            text-align: center;
        }
        .btn:hover { background: #00dd76; transform: translateY(-1px); }
        .btn-danger { background: var(--danger); color: white; }
        .btn-danger:hover { background: #e03b48; }
        .btn-secondary { background: #1a1a24; color: white; border: 1px solid var(--border); }
        .btn-secondary:hover { background: #252533; }

        .quest-list {
            flex: 1;
            overflow-y: auto;
            margin-bottom: 15px;
        }

        .quest-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 6px;
            margin-bottom: 6px;
            text-align: left;
            width: 100%;
            font-family: inherit;
            color: inherit;
            cursor: pointer;
        }
        .quest-item:hover, .quest-item.active {
            border-color: var(--accent);
            background: var(--accent-dim);
        }

        .scrub-action { background: none; border: none; color: var(--text-dim); cursor: pointer; font-size: 14px; font-weight: bold; }
        .scrub-action:hover { color: var(--danger); }

        .workspace {
            flex: 1;
            padding: 40px;
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
            background: radial-gradient(circle at 90% 10%, rgba(0, 255, 136, 0.02), transparent);
        }

        .view-header {
            border-bottom: 1px solid var(--border);
            padding-bottom: 20px;
            margin-bottom: 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .view-header h1 { font-family: 'Orbitron', sans-serif; font-size: 24px; margin: 0; letter-spacing: 1px; }

        .terminal-container {
            flex: 1;
            background: #040406;
            border: 1px solid var(--border);
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        .terminal-feed {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            font-family: monospace;
            font-size: 14px;
            line-height: 1.6;
        }

        .msg { display: flex; flex-direction: column; max-width: 85%; }
        .msg.sys { align-self: flex-start; color: var(--accent); }
        .msg.user { align-self: flex-end; color: #69a1ff; text-align: right; }
        
        .msg-sender { font-size: 10px; font-family: 'Orbitron', sans-serif; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px; color: var(--text-dim); }
        .msg.sys .msg-sender { color: var(--accent); }
        .msg.user .msg-sender { color: var(--terminal-user); }

        .msg-text { background: rgba(255, 255, 255, 0.02); padding: 12px 16px; border-radius: 8px; border: 1px solid var(--border); white-space: pre-wrap; }
        .msg.sys .msg-text { background: var(--accent-dim); border-color: rgba(0, 255, 136, 0.15); }
        .msg.user .msg-text { background: rgba(59, 130, 246, 0.08); border-color: rgba(59, 130, 246, 0.15); }

        .terminal-input-bar {
            display: flex;
            border-top: 1px solid var(--border);
            background: #09090c;
            padding: 12px;
            gap: 12px;
            align-items: center;
        }
        .terminal-input-bar input { margin-bottom: 0; font-family: monospace; }
        .terminal-input-bar ::placeholder { color: #4b4b5a; }

        .export-drawer {
            margin-top: 20px;
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 16px;
        }
    </style>
</head>
<body>

<div class="sidebar">
    <div>
        <h1 style="font-family:'Orbitron'; font-size: 20px; color: var(--accent); margin: 0; letter-spacing: 1px;">QUEST_LOG.EXE</h1>
        
        <h2>Append Action Targets</h2>
        <div class="config-box">
            <input type="text" id="quest-input" placeholder="Goal/Task Objective...">
            <button class="btn" onclick="addQuestNode()">Register Objective</button>
        </div>

        <h2>Active Objectives Matrix</h2>
        <div id="quest-list-container" class="quest-list"></div>
    </div>

    <div>
        <button class="btn btn-danger" onclick="triggerGlobalReset()">⚠️ Global Reset Epoch</button>
    </div>
</div>

<div class="workspace">
    <div class="view-header">
        <div>
            <h1 id="terminal-header">Socratic Disruptor Console</h1>
            <div style="font-size: 11px; color: var(--text-dim); text-transform: uppercase; margin-top: 4px; letter-spacing: 1px;">Status: Operational // Interactive Bypass Loop</div>
        </div>
    </div>

    <div class="terminal-container">
        <div id="terminal-feed" class="terminal-feed"></div>
        <div class="terminal-input-bar">
            <span style="color: var(--accent); font-family: monospace; font-weight: bold; padding-left: 8px;">&gt;</span>
            <input type="text" id="terminal-input" placeholder="Type here to respond to the system query..." autocomplete="off">
            <button class="btn" style="width: auto; padding: 0 24px; height: 42px;" onclick="handleUserSubmit()">Send</button>
        </div>
    </div>

    <div class="export-drawer">
        <h2 style="margin-top: 0;">AI Payload Transmission Stream</h2>
        <div style="display: flex; gap: 12px; margin-bottom: 10px;">
            <button class="btn btn-secondary" style="padding: 8px 16px; font-size: 11px;" onclick="assembleAiPayload()">Generate Telemetry Package</button>
            <button class="btn btn-secondary" style="padding: 8px 16px; font-size: 11px;" onclick="copyPayloadText()">Copy Stream</button>
        </div>
        <textarea id="export-box" readonly placeholder="Analytical JSON dialogue data logs will render here..."></textarea>
    </div>
</div>

<script>
    let state;
    const STORAGE_KEY = 'daily_quest_log_state_v5';

    // Static Hard-coded Objective Realities
    const baselineNightRoutine = [
        "Dinner & Wrist Exercises / Ergonomics (Maintenance)",
        "Pushups & Hydration (Water)",
        "Dental Care (Brush / Floss)",
        "GitHub Contribution Code Check-In"
    ];

    function initSystemState() {
        let raw = localStorage.getItem(STORAGE_KEY);
        try {
            state = JSON.parse(raw);
            if (!state || !state.quests || !state.dialogHistory) throw new Error();
        } catch (e) {
            state = {
                quests: [],
                dialogHistory: [
                    { sender: 'sys', text: "SYSTEM ACTIVE. Greet the console to access your core profile telemetry rules." }
                ]
            };
            save();
        }
    }

    function save() {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    }

    function renderQuests() {
        const container = document.getElementById('quest-list-container');
        container.innerHTML = '';
        
        if (state.quests.length === 0) {
            container.innerHTML = `<div style="color:var(--text-dim); font-size:12px; font-style:italic; padding:10px;">Matrix Empty. Load objectives to track.</div>`;
            return;
        }

        state.quests.forEach((q, idx) => {
            const el = document.createElement('div');
            el.className = `quest-item`;
            el.innerHTML = `
                <span style="font-size:14px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:80%;">🎯 ${q.name}</span>
                <button class="scrub-action" onclick="deleteQuestNode(${idx}, event)">✕</button>
            `;
            container.appendChild(el);
        });
    }

    function addQuestNode() {
        const input = document.getElementById('quest-input');
        const name = input.value.trim();
        if (!name) return;

        state.quests.push({ name, timestamp: new Date().toISOString() });
        input.value = '';
        save();
        renderQuests();
    }

    function deleteQuestNode(idx, e) {
        e.stopPropagation();
        state.quests.splice(idx, 1);
        save();
        renderQuests();
    }

    function renderTerminalFeed() {
        const feed = document.getElementById('terminal-feed');
        feed.innerHTML = '';

        state.dialogHistory.forEach(msg => {
            const card = document.createElement('div');
            card.className = `msg ${msg.sender}`;
            card.innerHTML = `
                <span class="msg-sender">${msg.sender === 'sys' ? 'SYS_DISRUPTOR' : 'USER_TARGET'}</span>
                <div class="msg-text">${msg.text}</div>
            `;
            feed.appendChild(card);
        });

        feed.scrollTop = feed.scrollHeight;
    }

    function appendDialog(sender, text) {
        state.dialogHistory.push({ sender, text });
        save();
        renderTerminalFeed();
    }

    function handleUserSubmit() {
        const input = document.getElementById('terminal-input');
        const text = input.value.trim();
        if (!text) return;

        appendDialog('user', text);
        input.value = '';

        setTimeout(() => {
            const queryClean = text.toLowerCase().replace(/[^a-zA-Z0-9\s]/g, "");
            const currentHour = new Date().getHours(); 

            // 1. Bedtime Structural Override Check (Past Bedtime Anomaly: Midnight to 5 AM)
            if (currentHour >= 0 && currentHour < 5) {
                appendDialog('sys', "Routine anomaly detected. Current timestamp falls completely outside safe operational windows. You are executing an irrational late-night loop. Drop keyboard focus. Disconnect terminal and go back to sleep now.");
                return;
            }

            // 2. Night Routine Query Logic Path
            if (queryClean.includes("night routine") || queryClean.includes("nightly routine")) {
                // If data blocks have been wiped or initialized empty, perform direct ground refusal
                if (state.quests.length === 0) {
                    appendDialog('sys', "I don't know. Missing data profile attributes: Active tracking registry array is unassigned. Populate your tracking baseline parameters inside the matrix configuration sidebar to clear this exception.");
                } else {
                    // Match found: Output clean objective baseline data immediately with no afterthought
                    let responsePayload = "Confirmed night routine baseline parameter list:\n";
                    baselineNightRoutine.forEach((item, index) => {
                        responsePayload += `${index + 1}. ${item}\n`;
                    });
                    responsePayload += `\nTarget tracking check-in lock: 10:00 PM.`;
                    appendDialog('sys', responsePayload);
                }
                return;
            }

            // 3. Greeting Route Path
            if (queryClean === 'hi' || queryClean === 'hello' || queryClean === 'hey') {
                appendDialog('sys', "Console active. Connection verified. Query the engine for your exact metrics.");
                return;
            }

            // 4. Default Unknown Unfamiliar Data Route
            appendDialog('sys', "I don't know. Encountered an unfamiliar tracking context query string. The system will not formulate inferences or guess parameters. Supply explicit metadata updates.");

        }, 300);
    }

    function triggerGlobalReset() {
        const confirmation = confirm("⚠️ PURGE ACTIVE MATRIX DATA ⚠️\n\nThis wipes all stored tracking files and conversation strings clean.");
        if (!confirmation) return;

        state = {
            quests: [],
            dialogHistory: [
                { sender: 'sys', text: "SYSTEM WIPED. Timeline reset to factory ground states. Greet the console to authenticate." }
            ]
        };
        save();
        renderQuests();
        renderTerminalFeed();
        document.getElementById('export-box').value = '';
    }

    function assembleAiPayload() {
        const payload = {
            exportTimestamp: new Date().toISOString(),
            registeredObjectives: state.quests,
            socraticDialogueLog: state.dialogHistory
        };
        document.getElementById('export-box').value = JSON.stringify(payload, null, 2);
    }

    function copyPayloadText() {
        const box = document.getElementById('export-box');
        if (!box.value) return;
        box.select();
        try {
            navigator.clipboard.writeText(box.value);
        } catch (err) {}
    }

    window.addEventListener('keydown', function(e) {
        if (e.key === 'Enter' && document.activeElement === document.getElementById('terminal-input')) {
            handleUserSubmit();
        }
    });

    initSystemState();
    renderQuests();
    renderTerminalFeed();
</script>
</body>
</html>
