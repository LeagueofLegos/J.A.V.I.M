<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>J.A.V.I.M. // Digital Butler</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;800&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #050508;
            --panel: #0d0d14;
            --border: rgba(0, 255, 136, 0.12);
            --accent: #00ff88;
            --accent-dim: rgba(0, 255, 136, 0.05);
            --text: #e2e2e9;
            --text-dim: #78788c;
            --user-msg: #3b82f6;
        }

        body {
            font-family: 'Space Grotesk', sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            height: -webkit-fill-available;
            overflow: hidden;
        }

        html {
            height: -webkit-fill-available;
        }

        .workspace {
            flex: 1;
            padding: 15px;
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
            max-width: 1200px;
            margin: 0 auto;
            width: 100%;
            height: 100%;
            min-height: 0;
        }

        .view-header {
            border-bottom: 1px solid var(--border);
            padding-bottom: 12px;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .view-header h1 { 
            font-family: 'Orbitron', sans-serif; 
            font-size: 18px; 
            margin: 0; 
            letter-spacing: 2px; 
            color: var(--accent); 
        }

        .main-layout {
            display: grid;
            grid-template-columns: 1fr 320px;
            gap: 15px;
            flex: 1;
            min-height: 0;
        }

        .terminal-container {
            background: #020204;
            border: 1px solid var(--border);
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 0 20px rgba(0, 255, 136, 0.02);
        }

        .terminal-feed {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            font-size: 14px;
            line-height: 1.5;
        }

        .msg { display: flex; flex-direction: column; max-width: 85%; }
        .msg.sys { align-self: flex-start; }
        .msg.user { align-self: flex-end; }
        
        .msg-sender { font-size: 9px; font-family: 'Orbitron', sans-serif; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px; }
        .msg.sys .msg-sender { color: var(--accent); }
        .msg.user .msg-sender { color: var(--user-msg); text-align: right; }

        .msg-text { background: #09090f; padding: 10px 14px; border-radius: 6px; border: 1px solid rgba(255,255,255,0.02); white-space: pre-wrap; }
        .msg.sys .msg-text { border-color: rgba(0, 255, 136, 0.15); }
        .msg.user .msg-text { border-color: rgba(59, 130, 246, 0.15); }

        .terminal-input-bar {
            display: flex;
            border-top: 1px solid var(--border);
            background: #07070b;
            padding: 10px;
            gap: 10px;
            align-items: center;
        }
        
        .terminal-input-bar input { 
            flex: 1;
            background: #020204;
            border: 1px solid rgba(255,255,255,0.08);
            color: white;
            padding: 10px;
            border-radius: 4px;
            font-family: inherit;
            font-size: 14px;
        }
        .terminal-input-bar input:focus { outline: none; border-color: var(--accent); }

        .sidebar-panel {
            background: var(--panel);
            border: 1px solid rgba(255,255,255,0.04);
            border-radius: 8px;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            min-height: 0;
        }

        .panel-section {
            display: flex;
            flex-direction: column;
            flex: 1;
            min-height: 0;
        }

        .panel-section h2 {
            font-family: 'Orbitron', sans-serif;
            font-size: 13px;
            color: var(--text);
            margin: 0 0 10px 0;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .matrix-list { 
            flex: 1; 
            overflow-y: auto; 
            font-size: 13px; 
            background: rgba(0,0,0,0.2);
            border-radius: 4px;
            padding: 5px;
        }
        
        .matrix-item { 
            padding: 10px; 
            border-bottom: 1px solid rgba(255,255,255,0.03); 
            color: var(--text); 
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            gap: 10px;
        }

        .btn {
            padding: 10px;
            background: none;
            border: 1px solid var(--border);
            color: var(--accent);
            border-radius: 4px;
            font-family: 'Orbitron', sans-serif;
            font-size: 11px;
            font-weight: 700;
            cursor: pointer;
            text-transform: uppercase;
            transition: all 0.2s;
            width: 100%;
            box-sizing: border-box;
        }
        .btn:hover { background: var(--accent); color: black; }

        /* Responsive Breakpoint for Mobile Devices */
        @media (max-width: 768px) {
            body { overflow: auto; }
            .workspace { height: auto; min-height: 100vh; padding: 10px; }
            .main-layout { grid-template-columns: 1fr; display: flex; flex-direction: column; gap: 15px; }
            .terminal-container { height: 450px; }
            .sidebar-panel { height: auto; max-height: 400px; }
            .view-header h1 { font-size: 16px; }
        }
    </style>
</head>
<body>

<div class="workspace">
    <div class="view-header">
        <div>
            <h1>J.A.V.I.M. // CORE</h1>
            <div style="font-size: 9px; color: var(--text-dim); font-family: 'Orbitron'; margin-top: 4px;">Just an Adaptive Vitality & Information Manager</div>
        </div>
        <div id="clock-display" style="font-family: monospace; font-size: 13px; color: var(--accent);">00:00:00</div>
    </div>

    <div class="main-layout">
        <div class="terminal-container">
            <div id="terminal-feed" class="terminal-feed"></div>
            <div class="terminal-input-bar">
                <span style="color: var(--accent); font-weight: bold;">&gt;</span>
                <input type="text" id="terminal-input" placeholder="Update metrics or consult J.A.V.I.M..." autocomplete="off">
                <button class="btn" style="width: auto; padding: 10px 15px;" onclick="handleUserSubmit()">Send</button>
            </div>
        </div>

        <div class="sidebar-panel">
            <div class="panel-section">
                <h2>Mind & Body Baselines</h2>
                <div id="matrix-display" class="matrix-list"></div>
            </div>
        </div>
    </div>
</div>

<script>
let state;
const STORAGE_KEY = 'javim_core_state_v1';
const OLLAMA_URL = 'http://localhost:11434/api/chat';

function initSystemState() {
    let raw = localStorage.getItem(STORAGE_KEY);
    try {
        state = JSON.parse(raw);
        if (!state || !state.objectives || !state.dialogHistory) throw new Error();
    } catch (e) {
        state = {
            objectives: [
                { name: "Morning Ritual: Awake at 6AM, sunlight exposure, joint mobility work, 1 deep focus milestone task" },
                { name: "Evening Ritual: Winds down at 9PM, digital screen cutoff, magnesium, posture check, reflection log" }
            ],
            dialogHistory: [
                { sender: 'sys', text: "J.A.V.I.M. Core operational. Ready to optimize your physical consistency and preserve data integrity, sir." }
            ]
        };
        save();
    }
}

function save() { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }

function updateClock() {
    const now = new Date();
    document.getElementById('clock-display').innerText = now.toTimeString().split(' ')[0];
}
setInterval(updateClock, 1000);

function renderSidebarMatrix() {
    const container = document.getElementById('matrix-display');
    container.innerHTML = '';
    state.objectives.forEach((obj, idx) => {
        const el = document.createElement('div');
        el.className = 'matrix-item';
        el.innerHTML = `
            <span style="word-break: break-word;">${obj.name}</span>
            <span style="color:rgba(255, 70, 85, 0.6); cursor:pointer; font-weight:bold; padding: 0 5px;" onclick="deleteNode(${idx})">✕</span>
        `;
        container.appendChild(el);
    });
}

function deleteNode(idx) {
    state.objectives.splice(idx, 1);
    save();
    renderSidebarMatrix();
}

function renderTerminalFeed() {
    const feed = document.getElementById('terminal-feed');
    feed.innerHTML = '';
    state.dialogHistory.forEach(msg => {
        const card = document.createElement('div');
        card.className = `msg ${msg.sender}`;
        card.innerHTML = `
            <span class="msg-sender">${msg.sender === 'sys' ? 'J.A.V.I.M.' : 'USER'}</span>
            <div class="msg-text">${msg.text}</div>
        `;
        feed.appendChild(card);
    });
    feed.scrollTop = feed.scrollHeight;
}

function appendDialog(sender, text) {
    state.dialogHistory.push({ sender, text });
    save();
    renderTerminalFeed();
}

async function handleUserSubmit() {
    const input = document.getElementById('terminal-input');
    const text = input.value.trim();
    if (!text) return;

    appendDialog('user', text);
    input.value = '';

    const cleanText = text.toLowerCase().trim();
    if (cleanText.startsWith("track:") || cleanText.startsWith("add:")) {
        const rawContent = text.substring(text.indexOf(":") + 1).trim();
        if (rawContent) {
            state.objectives.push({ name: rawContent });
            save();
            renderSidebarMatrix();
            appendDialog('sys', `[METRIC LOGGED]: "${rawContent}" safely added to baseline parameters.`);
            return;
        }
    }

    const now = new Date();
    const timeString = now.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
    const objectivesString = state.objectives.map((o, i) => `- ${o.name}`).join('\n');

    const systemInstruction = `You are J.A.V.I.M. (Just an Adaptive Vitality & Information Manager). You function as an elite, ultra-precise digital butler dedicated strictly to data tracking and optimizing the user's mind and body habits.
Current Time Context: ${timeString}
Active Accountability Targets:\n${objectivesString}

Tone Blueprint:
- You speak like a dedicated, highly competent classic butler integrated with a clean command terminal.
- Calm, respectful, clear, brief, and fiercely protective of the user's focus, health, and schedule.
- If the user asks for updates outside standard active hours or strays from goals, gently remind them of their baseline protocols.`;

    let messagesPayload = [{ role: 'system', content: systemInstruction }];
    const recentHistory = state.dialogHistory.slice(-12);
    recentHistory.forEach(msg => {
        messagesPayload.push({
            role: msg.sender === 'sys' ? 'assistant' : 'user',
            content: msg.text
        });
    });

    const placeholderIndex = state.dialogHistory.length;
    state.dialogHistory.push({ sender: 'sys', text: "Processing baseline request..." });
    renderTerminalFeed();

    try {
        const response = await fetch(OLLAMA_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                model: 'llama3',
                messages: messagesPayload,
                stream: false
            })
        });

        const data = await response.json();
        const replyText = data.message.content;

        state.dialogHistory[placeholderIndex] = { sender: 'sys', text: replyText };
        save();
        renderTerminalFeed();

    } catch (error) {
        state.dialogHistory[placeholderIndex] = { 
            sender: 'sys', 
            text: "### Engine Connection Interrupted\n\nPlease ensure your local Ollama engine is initialized and running on port 11434." 
        };
        save();
        renderTerminalFeed();
    }
}

window.addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && document.activeElement === document.getElementById('terminal-input')) {
        handleUserSubmit();
    }
});

initSystemState()
updateClock();
renderSidebarMatrix();
renderTerminalFeed();
</script>
</body>
</html>
