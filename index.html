<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quest Log Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg: #121212;
            --card-bg: #1e1e1e;
            --text: #e0e0e0;
            --accent: #4ade80;
            --danger: #ff5f5f;
            --nav-bg: #2a2a2a;
        }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* Navigation */
        nav {
            width: 100%;
            background: var(--nav-bg);
            padding: 10px 0;
            display: flex;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        nav button {
            background: none;
            border: 1px solid #444;
            color: var(--text);
            padding: 8px 12px;
            cursor: pointer;
            border-radius: 5px;
            font-size: 0.9rem;
        }
        nav button.active {
            background: var(--accent);
            color: black;
            border-color: var(--accent);
        }

        .container { width: 90%; max-width: 500px; padding: 20px; }
        .view { display: none; }
        .view.active { display: block; }

        h1 { border-bottom: 2px solid var(--accent); padding-bottom: 10px; text-transform: capitalize; }

        /* Input Area */
        .input-group { display: flex; gap: 10px; margin-bottom: 20px; }
        input[type="text"] {
            flex: 1; padding: 12px; border-radius: 5px; border: 1px solid #444;
            background: var(--card-bg); color: white;
        }
        .add-btn {
            padding: 10px 20px; background: var(--accent); border: none;
            border-radius: 5px; font-weight: bold; cursor: pointer;
        }

        /* Task Items */
        .task-item {
            display: flex; align-items: center; background: var(--card-bg);
            margin: 10px 0; padding: 12px; border-radius: 8px;
        }
        .task-content { display: flex; align-items: center; flex: 1; cursor: pointer; }
        input[type="checkbox"] { margin-right: 15px; transform: scale(1.3); accent-color: var(--accent); }
        .completed { text-decoration: line-through; opacity: 0.4; }
        
        .delete-btn { color: var(--danger); background: none; border: none; font-size: 1.2rem; cursor: pointer; }
        
        /* Stats Section */
        #stats-container { margin-top: 30px; background: #252525; padding: 15px; border-radius: 10px; }
        canvas { width: 100% !important; height: auto !important; }
    </style>
</head>
<body>

<nav id="main-nav">
    <button onclick="switchTab('daily')" id="btn-daily">Daily</button>
    <button onclick="switchTab('weekly')" id="btn-weekly">Weekly</button>
    <button onclick="switchTab('biweekly')" id="btn-biweekly">Biweekly</button>
    <button onclick="switchTab('monthly')" id="btn-monthly">Monthly</button>
    <button onclick="switchTab('yearly')" id="btn-yearly">Yearly</button>
</nav>

<div class="container">
    <h1 id="view-title">Daily Checklist</h1>
    
    <div class="input-group">
        <input type="text" id="task-input" placeholder="New objective...">
        <button class="add-btn" onclick="addTask()">Add</button>
    </div>

    <div id="checklist"></div>

    <div id="stats-container">
        <h3>Performance (Last 7 Days)</h3>
        <canvas id="historyChart"></canvas>
    </div>
</div>

<script>
    let currentTab = 'daily';
    let chart = null;

    const config = {
        daily: { reset: 3, label: 'Daily' },
        weekly: { reset: 3, label: 'Weekly' },
        biweekly: { reset: 3, label: 'Biweekly' },
        monthly: { reset: 3, label: 'Monthly' },
        yearly: { reset: 3, label: 'Yearly' }
    };

    // Initialize data
    function getData(key, fallback = []) {
        const data = localStorage.getItem(key);
        return data ? JSON.parse(data) : fallback;
    }

    function switchTab(tab) {
        currentTab = tab;
        document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
        document.getElementById(`btn-${tab}`).classList.add('active');
        document.getElementById('view-title').innerText = `${tab} Checklist`;
        render();
    }

    function getProgressKey() {
        const now = new Date();
        const hour = now.getHours();
        let d = new Date();
        if (hour < config[currentTab].reset) d.setDate(d.getDate() - 1);
        
        const dateStr = d.toDateString();
        
        if (currentTab === 'daily') return `prog_daily_${dateStr}`;
        if (currentTab === 'weekly') {
            const week = Math.floor(d.getDate() / 7);
            return `prog_weekly_${d.getMonth()}_${week}_${d.getFullYear()}`;
        }
        if (currentTab === 'monthly') return `prog_monthly_${d.getMonth()}_${d.getFullYear()}`;
        if (currentTab === 'yearly') return `prog_yearly_${d.getFullYear()}`;
        return `prog_${currentTab}_${dateStr}`;
    }

    function addTask() {
        const input = document.getElementById('task-input');
        const val = input.value.trim();
        if (!val) return;

        const masterList = getData(`master_${currentTab}`);
        masterList.push(val);
        localStorage.setItem(`master_${currentTab}`, JSON.stringify(masterList));
        input.value = '';
        render();
    }

    window.toggleTask = function(taskName) {
        const key = getProgressKey();
        const progress = getData(key, {});
        const history = getData('task_history', []);

        progress[taskName] = !progress[taskName];
        
        // Log to history if checked
        if (progress[taskName]) {
            history.push({ task: taskName, category: currentTab, time: Date.now() });
        } else {
            // Remove last instance if unchecked
            const idx = history.findLastIndex(h => h.task === taskName && h.category === currentTab);
            if (idx > -1) history.splice(idx, 1);
        }

        localStorage.setItem(key, JSON.stringify(progress));
        localStorage.setItem('task_history', JSON.stringify(history));
        render();
    };

    window.deleteTask = function(index) {
        const masterList = getData(`master_${currentTab}`);
        masterList.splice(index, 1);
        localStorage.setItem(`master_${currentTab}`, JSON.stringify(masterList));
        render();
    };

    function updateChart() {
        const history = getData('task_history', []);
        const last7Days = [...Array(7)].map((_, i) => {
            const d = new Date();
            d.setDate(d.getDate() - i);
            return d.toDateString();
        }).reverse();

        const counts = last7Days.map(date => {
            return history.filter(h => 
                h.category === currentTab && 
                new Date(h.time).toDateString() === date
            ).length;
        });

        const ctx = document.getElementById('historyChart').getContext('2d');
        if (chart) chart.destroy();
        
        chart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: last7Days.map(d => d.split(' ').slice(0, 3).join(' ')),
                datasets: [{
                    label: 'Tasks Completed',
                    data: counts,
                    borderColor: '#4ade80',
                    backgroundColor: 'rgba(74, 222, 128, 0.1)',
                    fill: true,
                    tension: 0.3
                }]
            },
            options: {
                scales: {
                    y: { beginAtZero: true, grid: { color: '#333' }, ticks: { color: '#888', stepSize: 1 } },
                    x: { grid: { display: false }, ticks: { color: '#888' } }
                },
                plugins: { legend: { display: false } }
            }
        });
    }

    function render() {
        const container = document.getElementById('checklist');
        const tasks = getData(`master_${currentTab}`);
        const progress = getData(getProgressKey(), {});

        container.innerHTML = '';
        tasks.forEach((task, index) => {
            const isChecked = progress[task] || false;
            const div = document.createElement('div');
            div.className = 'task-item';
            div.innerHTML = `
                <div class="task-content" onclick="toggleTask('${task}')">
                    <input type="checkbox" ${isChecked ? 'checked' : ''}>
                    <span class="${isChecked ? 'completed' : ''}">${task}</span>
                </div>
                <button class="delete-btn" onclick="deleteTask(${index})">×</button>
            `;
            container.appendChild(div);
        });
        updateChart();
    }

    // Initialize
    switchTab('daily');
</script>
</body>
</html>
