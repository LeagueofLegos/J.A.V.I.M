<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>J.A.R.P.I.S.S. // Command Terminal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Space+Grotesk:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #050507;
            --panel: #0b0b10;
            --border: rgba(0, 255, 136, 0.1);
            --accent: #00ff88;
            --accent-dim: rgba(0, 255, 136, 0.05);
            --danger: #ff4655;
            --text: #e2e2e9;
            --text-dim: #626272;
            --terminal-user: #3b82f6;
        }

        body {
            font-family: 'Space Grotesk', sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        .workspace {
            flex: 1;
            padding: 30px;
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
            max-width: 1200px;
            margin: 0 auto;
            width: 100%;
        }

        .view-header {
            border-bottom: 1px solid var(--border);
            padding-bottom: 15px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .view-header h1 { font-family: 'Orbitron', sans-serif; font-size: 22px; margin: 0; letter-spacing: 2px; color: var(--accent); }

        .main-layout {
            display: grid;
            grid-template-columns: 1fr 300px;
            gap: 20px;
            flex: 1;
            min-height: 0;
        }

        .terminal-container {
            background: #020203;
            border: 1px solid var(--border);
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 0 20px rgba(0, 255, 136, 0.03);
        }

        .terminal-feed {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 14px;
            font-family: monospace;
            font-size: 14px;
            line-height: 1.5;
        }

        .msg { display: flex; flex-direction: column; max-width: 90%; }
        .msg.sys { align-self: flex-start; color: var(--accent); }
        .msg.user { align-self: flex-end; color: #69a1ff; text-align: right; }
        
        .msg-sender { font-size: 10px; font-family: 'Orbitron', sans-serif; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px; }
        .msg.sys .msg-sender { color: var(--accent); }
        .msg.user .msg-sender { color: var(--terminal-user); }

        .msg-text { background: #08080c; padding: 12px 16px; border-radius: 6px; border: 1px solid rgba(255,255,255,0.03); white-space: pre-wrap; }
        .msg.sys .msg-text { border-color: rgba(0, 255, 136, 0.15); background: rgba(0, 255, 136, 0.01); }

        .terminal-input-bar {
            display: flex;
            border-top: 1px solid var(--border);
            background: #07070a;
            padding: 12px;
            gap: 12px;
            align-items: center;
        }
        .terminal-input-bar input { 
            flex: 1;
            background: #020203;
            border: 1px solid rgba(255,255,255,0.08);
            color: white;
            padding: 12px;
            border-radius: 4px;
            font-family: monospace;
            font-size: 14px;
        }
        .terminal-input-bar input:focus { outline: none; border-color: var(--accent); }

        .sidebar-panel {
            background: var(--panel);
            border: 1px solid rgba(255,255,255,0.04);
            border-radius: 8px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .matrix-list { flex: 1; overflow-y: auto; font-family: monospace; font-size: 12px; }
        .matrix-item { padding: 8px; border-bottom: 1px solid rgba(255,255,255,0.03); color: var(--text); display: flex; justify-content: space-between; }

        .btn {
            padding: 10px;
            background: none;
            border: 1px solid var(--border);
            color: var(--accent);
            border-radius: 4px;
            font-family: 'Orbitron', sans-serif;
            font-size: 11px;
            font-weight: 700;
            cursor: pointer;
            text-transform: uppercase;
            transition: all 0.2s;
        }
        .btn:hover { background: var(--accent); color: black; }
        .btn-danger { border-color: var(--danger); color: var(--danger); }
        .btn-danger:hover { background: var(--danger); color: white; }
        
        textarea { width: 100%; height: 80px; background: #020203; border: 1px solid rgba(255,255,255,0.05); color: var(--accent); font-family: monospace; font-size: 11px; resize: none; margin-top: 10px; padding: 8px; box-sizing: border-box; }
    </style>
</head>
<body>

<div class="workspace">
    <div class="view-header">
        <div>
            <h1>J.A.R.P.I.S.S. // CORE</h1>
            <div style="font-size: 10px; color: var(--text-dim); font-family: 'Orbitron'; margin-top: 4px;">Just Absurdly Real Person Intelligently Strong Servant</div>
        </div>
        <div id="clock-display" style="font-family: monospace; font-size: 14px; color: var(--accent);">00:00:00</div>
    </div>

    <div class="main-layout">
        <div class="terminal-container">
            <div id="terminal-feed" class="terminal-feed"></div>
            <div class="terminal-input-bar">
                <span style="color: var(--accent); font-family: monospace; font-weight: bold;">&gt;</span>
                <input type="text" id="terminal-input" placeholder="Ask what to do, query time, or type 'add objective: [text]'..." autocomplete="off">
                <button class="btn" onclick="handleUserSubmit()">Execute</button>
            </div>
        </div>

        <div class="sidebar-panel">
            <div>
                <h2 style="margin-top: 0;">Active Realities</h2>
                <div id="matrix-display" class="matrix-list"></div>
            </div>
            <div>
                <button class="btn" style="width: 100%; margin-bottom: 8px;" onclick="assembleAiPayload()">Dump Telemetry</button>
                <button class="btn btn-danger" style="width: 100%;" onclick="triggerGlobalReset()">Reset Epoch</button>
                <textarea id="export-box" readonly placeholder="JSON stream logs output..."></textarea>
            </div>
        </div>
    </div>
</div>

<script>
    let state;
    const STORAGE_KEY = 'jarpiss_core_state_v6';

    function initSystemState() {
        let raw = localStorage.getItem(STORAGE_KEY);
        try {
            state = JSON.parse(raw);
            if (!state || !state.objectives || !state.dialogHistory) throw new Error();
        } catch (e) {
            state = {
                objectives: [
                    { name: "Morning Routine: wake up(6am), walk outside, pushups, wrist exercises, apply to a job" },
                    { name: "Night Routine: start(9pm), pushups, water, floss, brush teeth, wrist exercises, apply to one job" }
                ],
                dialogHistory: [
                    { sender: 'sys', text: "J.A.R.P.I.S.S. online. Systems operational. Give me a greeting or query a status parameter." }
                ]
            };
            save();
        }
    }

    function save() { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }

    function updateClock() {
        const now = new Date();
        document.getElementById('clock-display').innerText = now.toTimeString().split(' ')[0];
    }
    setInterval(updateClock, 1000);

    function renderSidebarMatrix() {
        const container = document.getElementById('matrix-display');
        container.innerHTML = '';
        state.objectives.forEach((obj, idx) => {
            const el = document.createElement('div');
            el.className = 'matrix-item';
            el.innerHTML = `
                <span style="white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 220px;">[${idx}] ${obj.name}</span>
                <span style="color:var(--danger); cursor:pointer;" onclick="deleteNode(${idx})">✕</span>
            `;
            container.appendChild(el);
        });
    }

    function deleteNode(idx) {
        state.objectives.splice(idx, 1);
        save();
        renderSidebarMatrix();
    }

    function renderTerminalFeed() {
        const feed = document.getElementById('terminal-feed');
        feed.innerHTML = '';
        state.dialogHistory.forEach(msg => {
            const card = document.createElement('div');
            card.className = `msg ${msg.sender}`;
            card.innerHTML = `
                <span class="msg-sender">${msg.sender === 'sys' ? 'J.A.R.P.I.S.S.' : 'OPERATOR'}</span>
                <div class="msg-text">${msg.text}</div>
            `;
            feed.appendChild(card);
        });
        feed.scrollTop = feed.scrollHeight;
    }

    function appendDialog(sender, text) {
        state.dialogHistory.push({ sender, text });
        save();
        renderTerminalFeed();
    }

    function handleUserSubmit() {
        const input = document.getElementById('terminal-input');
        const text = input.value.trim();
        if (!text) return;

        appendDialog('user', text);
        input.value = '';

        setTimeout(() => {
            const cleanText = text.toLowerCase().replace(/[^a-zA-Z0-9\s:]/g, "");
            const now = new Date();
            const currentHour = now.getHours();

            // 1. Bedtime Override Rule (Midnight to 5:00 AM Execution Boundary)
            if (currentHour >= 0 && currentHour < 5) {
                appendDialog('sys', `Look at the clock. It is ${now.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}. You are running an irrational late-night loop right now. Drop keyboard focus, close this terminal window, and go back to sleep.`);
                return;
            }

            // 2. Inline Objective Registration Intercept Command
            if (cleanText.startsWith("add objective")) {
                const rawContent = text.substring(text.indexOf(":") + 1).trim();
                if (rawContent) {
                    state.objectives.push({ name: rawContent });
                    save();
                    renderSidebarMatrix();
                    appendDialog('sys', `Objective logged successfully into active memory baseline:\n"${rawContent}"`);
                } else {
                    appendDialog('sys', "The command structure is invalid. Please supply explicit metadata parameters following the colon symbol.");
                }
                return;
            }

            // 3. System Clock Query Routing
            if (cleanText.includes("time") || cleanText.trim() === "clock") {
                appendDialog('sys', `Current internal system timestamp is exactly ${now.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit', second:'2-digit'})}.`);
                return;
            }

            // 4. Time-Aware Task Interrogation Loop Route
            const taskTriggers = ["should", "do", "doing", "now", "routine", "schedule", "quest"];
            if (taskTriggers.some(trigger => cleanText.includes(trigger))) {
                
                if (state.objectives.length === 0) {
                    appendDialog('sys', "I don't know. Active database entries are missing. Provide configuration parameters via 'add objective: [text]' to establish a local baseline.");
                    return;
                }

                // Scan objectives for matching chronological parameters
                let matchedRoutine = null;
                if (currentHour >= 5 && currentHour < 12) {
                    matchedRoutine = state.objectives.find(o => o.name.toLowerCase().includes("morning") || o.name.toLowerCase().includes("6am"));
                } else if (currentHour >= 18 || currentHour < 24) {
                    matchedRoutine = state.objectives.find(o => o.name.toLowerCase().includes("night") || o.name.toLowerCase().includes("9pm") || o.name.toLowerCase().includes("evening"));
                }

                if (matchedRoutine) {
                    appendDialog('sys', `Current baseline objective alignment requires immediate execution of:\n\n-> ${matchedRoutine.name}`);
                } else {
                    appendDialog('sys', "I don't know. The current time index does not correlate with any scheduled triggers inside your logged objectives. Update your rules to clear this data gap.");
                }
                return;
            }

            // 5. Classic Greet Routine Check
            const greetTriggers = ["hi", "hello", "hey", "awaken", "jarv", "jarpiss"];
            if (greetTriggers.some(trigger => cleanText.includes(trigger))) {
                appendDialog('sys', "System online. Standing by for specific matrix checks.");
                return;
            }

            // 6. Absolute Clean Ground Fallback Ground-State Refusal
            appendDialog('sys', "I don't know. Encountered an unfamiliar intent query. The system will not formulate casual inferences. Supply a clear operational tracking command.");

        }, 300);
    }

    function triggerGlobalReset() {
        if (!confirm("⚠️ PURGE EPOCH TIMELINE ⚠️\n\nReset memory files to default states?")) return;
        localStorage.removeItem(STORAGE_KEY);
        initSystemState();
        renderSidebarMatrix();
        renderTerminalFeed();
        document.getElementById('export-box').value = '';
    }

    function assembleAiPayload() {
        const payload = {
            exportTimestamp: new Date().toISOString(),
            objectivesRegistry: state.objectives,
            dialogueStream: state.dialogHistory
        };
        const box = document.getElementById('export-box');
        box.value = JSON.stringify(payload, null, 2);
        box.select();
    }

    window.addEventListener('keydown', function(e) {
        if (e.key === 'Enter' && document.activeElement === document.getElementById('terminal-input')) {
            handleUserSubmit();
        }
    });

    initSystemState();
    updateClock();
    renderSidebarMatrix();
    renderTerminalFeed();
</script>
</body>
</html>
